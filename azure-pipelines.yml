trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  BuildConfiguration: 'Release'

steps:

# Install .NET 8
- task: UseDotNet@2
  displayName: 'Install .NET 8 SDK'
  inputs:
    packageType: sdk
    version: '8.0.x'

# Restore packages
- task: DotNetCoreCLI@2
  displayName: 'Restore'
  inputs:
    command: restore
    projects: '**/*.sln'

# Build
- task: DotNetCoreCLI@2
  displayName: 'Build'
  inputs:
    command: build
    projects: '**/*.sln'
    arguments: '--configuration $(BuildConfiguration)'

# Install Playwright Browsers
- script: |
    dotnet tool install --global Microsoft.Playwright.CLI
    playwright install
  displayName: 'Install Playwright Browsers'

# Run NUnit Tests
- task: DotNetCoreCLI@2
  displayName: 'Run Tests'
  inputs:
    command: test
    projects: '**/*.sln'
    arguments: '--configuration $(BuildConfiguration) --logger trx'

# Publish NUnit Results
- task: PublishTestResults@2
  displayName: 'Publish Test Results'
  condition: always()
  inputs:
    testResultsFormat: VSTest
    testResultsFiles: '**/*.trx'
    mergeTestResults: true

# Publish Extent Report / Screenshots / Videos
- task: PublishBuildArtifacts@1
  displayName: Publish Automation Reports
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: TestResults
    # Copy reports to Artifact Staging Directory
- powershell: |
    Write-Host "Copying reports..."

    $artifact = "$(Build.ArtifactStagingDirectory)"

    New-Item -ItemType Directory -Force -Path $artifact

    Copy-Item "$(Build.SourcesDirectory)\MiniProject.Playwright.Tests\bin\Debug\net8.0\TestResults\*" `
        -Destination $artifact `
        -Recurse `
        -Force
  displayName: Copy Reports

# Publish Extent Report
- task: PublishBuildArtifacts@1
  displayName: Publish Automation Reports
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: TestResults